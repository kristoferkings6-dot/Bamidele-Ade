<script>

      { label: 'Below \u20a623,000,000',                 value: 0,         qualify: 'disqualify' },
      { label: 'Studio range \u2013 from \u20a623,000,000',  value: 23000000, qualify: true },
      { label: '2-Bedroom range \u2013 from \u20a667,000,000', value: 67000000, qualify: true },
      { label: '3-Bedroom range \u2013 from \u20a680,000,000', value: 80000000, qualify: true },
      { label: 'Not sure yet \u2013 I\u2019d like to see options first', value: 0, qualify: false }
    ]
  },

  {

    text: 'Are you prepared to provide proof of funds to secure a verified listing?',

    options: [
      { label: 'Yes \u2013 I can provide it',              qualify: true },
      { label: 'Not at this stage',                        qualify: false }
    ]
  },

  {
    key: 'purchase_timeline',
    text: 'How soon would you like to move into your own verified home?',
    hint: 'This helps us prioritise and match you to available listings.',
    options: [
      { label: 'Within the next 1 to 3 months', qualify: true },
      { label: 'Within 3 to 6 months',          qualify: true },
      { label: 'Within 6 to 12 months',         qualify: false },
      { label: 'Just exploring for now',        qualify: false }
    ]
  },

  {
    key: 'biggest_fear',
    text: 'What is your biggest fear about buying property in Lagos?',
    hint: 'This helps us know exactly how to protect you through our verification process.',
    options: [
      { label: 'Paying for a property with a fake or disputed title', qualify: false },
      { label: 'Moving to an area that turns out to be unsafe',       qualify: false },
      { label: 'Agents who disappear after collecting money',         qualify: false },

    ]
  },

  {
    key: 'readiness_to_speak',
    text: 'Are you ready to speak with Bamidele Adewale \u2013 our verified Lagos property agent \u2013 this week?',
    hint: 'Bamidele responds to all verified matches within 2 hours.',
    options: [
      { label: 'Yes \u2013 I am ready to be contacted immediately',                 qualify: true },
      { label: 'Yes \u2013 but I need a few more days to prepare',                  qualify: false },
      { label: 'I would prefer to receive property options on WhatsApp first',      qualify: false }
    ]
  }

];

var TOTAL_Q = QUESTIONS.length;
var answers = {};
var contact = { name:'', phone:'' };

(function build() {
  var card = document.getElementById('card-area');
  var html = '';

  for (var i = 0; i < QUESTIONS.length; i++) {
    var q = QUESTIONS[i];
    var num = i + 1;
    html += '<div class="step' + (i === 0 ? ' active' : '') + '" id="step-' + num + '">';
    html += '<div class="q-num">Question ' + num + ' of ' + TOTAL_Q + '</div>';
    html += '<div class="q-text">' + q.text + '</div>';
    html += '<div class="q-hint">' + q.hint + '</div>';
    html += '<div class="opts" id="opts-' + num + '">';
    for (var j = 0; j < q.options.length; j++) {
      html += '<button class="opt" onclick="pick(' + num + ',' + j + ',this)"><div class="radio"></div>' + q.options[j].label + '</button>';
    }
    html += '</div><div class="nav">';
    if (num > 1) html += '<button class="btn-back" onclick="goBack(' + num + ')">Back</button>';
    html += '<button class="btn-next" id="btn-' + num + '" disabled onclick="goNext(' + num + ')">Continue</button>';
    html += '</div></div>';
  }

  html += '<div class="step" id="step-contact">';
  html += '<div class="q-num">Almost done</div>';
  html += '<div class="q-text">Where should we send your Wealth Report?</div>';
  html += '<div class="q-hint">Enter your details to see your personalised report and unlock your verified matches.</div>';
  html += '<div class="fields">';
  html += '<div><label class="flabel">Full Name</label><input class="finput" id="f-name" type="text" placeholder="e.g. Adebayo Okafor" autocomplete="name"></div>';
  html += '<div><label class="flabel">WhatsApp Number</label><input class="finput" id="f-phone" type="tel" placeholder="e.g. 08012345678" autocomplete="tel"></div>';
  html += '</div>';
  html += '<div class="nav"><button class="btn-back" onclick="goBack(\'contact\')">Back</button>';
  html += '<button class="btn-next" onclick="submitForm()">See My Wealth Report</button></div>';
  html += '</div>';

  html += '<div class="step" id="step-result"><div class="result-wrap">';
  html += '<div class="badge" id="elig-badge">Assessment Complete</div>';
  html += '<div class="gap-label">Already Lost To Rent</div>';
  html += '<div class="gap-number" id="gap-number-past" style="font-size:clamp(1.6rem,6vw,2.3rem);margin-bottom:.15rem">\u20a60</div>';
  html += '<div class="gap-sub" style="margin-bottom:1rem">Based on the years you have already spent renting.</div>';
  html += '<div class="gap-label">Projected 5-Year Loss If Nothing Changes</div>';
  html += '<div class="gap-number" id="gap-number">\u20a60</div>';
  html += '<div class="gap-sub">This is money that could instead be building equity in a home you own.</div>';

  html += '<div class="pivot-box">';
  html += '<img class="pivot-photo" id="agent-photo-img" src="' + AGENT_PHOTO + '" alt="Bamidele Adewale" onerror="this.style.display=\'none\';document.getElementById(\'agent-photo-fallback\').style.display=\'flex\';">';
  html += '<div class="pivot-photo-fallback" id="agent-photo-fallback" style="display:none">BA</div>';
  html += '<div class="pivot-text">A senior consultant from <strong>Mr. Bamidele\u2019s team</strong> will call you within 24 hours to discuss your report and verified matches in the Ajah/Sangotedo corridor.</div>';

  html += '<a class="report-btn" id="report-download" href="' + REPORT_FILE + '" download>';
  html += '<span class="report-icon">\ud83d\udcc4</span> Download: 2026 Security Report &amp; Scam-Proof Checklist (PDF)';
  html += '</a>';

  html += '<div class="whatsapp-notice">';
  html += '<div class="wa-icon">\ud83d\udcf1</div>';
  html += '<div class="wa-text"><strong>Check your WhatsApp.</strong><br>Your personalised report summary and next steps will be sent shortly.</div>';
  html += '</div>';

  html += '<button class="restart-btn" onclick="restart()">Submit Another Response</button>';
  html += '</div></div>';

  card.innerHTML = html;
  setProgress(1);
})();

function setProgress(step) {
  var pct = step === 'contact' ? 90 : step === 'result' ? 100 : Math.round((step / TOTAL_Q) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent =
    step === 'contact' ? 'Almost done' :
    step === 'result'  ? 'Complete' :
    'Question ' + step + ' of ' + TOTAL_Q;
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('step-' + n).classList.add('active');
  setProgress(n);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pick(stepNum, optIdx, el) {
  document.querySelectorAll('#opts-' + stepNum + ' .opt').forEach(function(o){ o.classList.remove('sel'); });
  el.classList.add('sel');
  var opt = QUESTIONS[stepNum - 1].options[optIdx];
  answers[stepNum] = {
    label: opt.label,
    key: QUESTIONS[stepNum - 1].key,
    value: opt.value !== undefined ? opt.value : null,
    qualify: opt.qualify
  };
  var btn = document.getElementById('btn-' + stepNum);
  if (btn) btn.disabled = false;
  kga('question_' + stepNum + '_completed', { client: clientName });
}

function goNext(current) {
  if (!answers[current]) return;
  if (current === TOTAL_Q) {
    kga('all_questions_complete', { client: clientName });
    try { fbq('trackCustom', 'AllQuestionsComplete'); } catch(e) {}
    showStep('contact');
  } else {
    showStep(current + 1);
  }
}

function goBack(current) {
  if (current === 'contact') { showStep(TOTAL_Q); }
  else { showStep(current - 1); }
}

function calcEligibility() {
  // Question order: 1=annual_rent, 2=years_renting, 3=target_budget, 4=proof_of_funds, 5=timeline, 6=biggest_fear, 7=readiness
  if (answers[3] && answers[3].qualify === 'disqualify') return false;
  var rentVal   = answers[1] ? answers[1].value : 0;
  var budgetVal = answers[3] ? answers[3].value : 0;
  var pof       = answers[4] ? answers[4].qualify === true : false;
  var timelineOk = answers[5] ? answers[5].qualify === true : false;
  return (rentVal >= 3000000 && budgetVal >= 23000000 && pof === true && timelineOk === true);
}

function submitForm() {
  var nameEl  = document.getElementById('f-name');
  var phoneEl = document.getElementById('f-phone');
  nameEl.classList.remove('err');
  phoneEl.classList.remove('err');
  var ok = true;
  if (nameEl.value.trim().length < 2)   { nameEl.classList.add('err');  ok = false; }
  if (phoneEl.value.trim().length < 10) { phoneEl.classList.add('err'); ok = false; }
  if (!ok) return;

  var submitBtn = document.querySelector('#step-contact .btn-next');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting\u2026'; }

  contact.name  = nameEl.value.trim();
  contact.phone = phoneEl.value.trim();

  var rentVal      = answers[1] ? answers[1].value : 0;
  var yearsRenting = answers[2] ? answers[2].value : 0;
  var alreadyLost  = Math.round(rentVal * yearsRenting);
  var wealthGap    = rentVal * 5;
  var isEligible   = calcEligibility();
  var status       = isEligible ? 'Highly Eligible' : 'Assessment Complete';

  kga('form_complete', { client: clientName, eligibility: status, wealth_gap: wealthGap, already_lost: alreadyLost });
  if (isEligible) kga('lead_qualified', { client: clientName, wealth_gap: wealthGap });

  if (isEligible) {
    try { fbq('track', 'Lead'); } catch(e) {}
    try { fbq('trackCustom', 'KringstarWealthEngineEligible', { wealth_gap: wealthGap }); } catch(e) {}
  }

  document.getElementById('gap-number-past').textContent =
    '\u20a6' + alreadyLost.toLocaleString('en-NG');
  document.getElementById('gap-number').textContent =
    '\u20a6' + wealthGap.toLocaleString('en-NG');
  var badge = document.getElementById('elig-badge');
  if (isEligible) {
    badge.textContent = 'Highly Eligible';
    badge.className = 'badge badge-eligible';
  } else {
    badge.textContent = 'Assessment Complete';
    badge.className = 'badge badge-review';
  }

  showStep('result');

  var params = [
    'source_url='            + encodeURIComponent(window.location.href),
    'client_name='           + encodeURIComponent(clientName),
    'full_name='             + encodeURIComponent(contact.name),
    'whatsapp='              + encodeURIComponent(contact.phone),
    'eligibility_status='    + encodeURIComponent(status),
    'wealth_gap='            + encodeURIComponent(wealthGap),
    'submitted_at='          + encodeURIComponent(new Date().toISOString())
  ];
  for (var i = 1; i <= TOTAL_Q; i++) {
    params.push(encodeURIComponent(QUESTIONS[i-1].key) + '=' + encodeURIComponent(answers[i] ? answers[i].label : ''));
  }
  var body = params.join('&');

  fetch(WEBHOOK, { method: 'POST', mode: 'no-cors', body: body }).catch(function(){});
}

function restart() {
  answers = {};
  contact = { name:'', phone:'' };
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('sel'); });
  document.querySelectorAll('[id^="btn-"]').forEach(function(b){ b.disabled = true; });
  showStep(1);
}
</script>
</body>
</html>
